    <link rel="stylesheet" href="/vendor/tabler-icons/tabler-icons.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;background:#F5F5F3;color:#0F1A14}

        /* NAV */
        nav{background:#0F1A14;padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .nav-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;letter-spacing:-.5px;text-decoration:none}
        .nav-logo .a{color:#C8D8C0}.nav-logo .b{color:#1D7A4F}
        .nav-links{display:flex;gap:1.5rem}
        .nav-links a{font-size:13px;color:#C8D8C0;text-decoration:none;opacity:.7;transition:opacity .2s}
        .nav-links a:hover{opacity:1}
        .nav-right{display:flex;gap:12px;align-items:center}
        .nav-icon{color:#C8D8C0;opacity:.7;font-size:18px;cursor:pointer;text-decoration:none;transition:opacity .2s}
        .nav-icon:hover{opacity:1}
        .nav-user{font-size:12px;color:#6B8A7A}
        .nav-admin{font-size:12px;color:#4A6A5A;text-decoration:none;padding:4px 10px;border:1px solid #2A4A38;border-radius:2px}
        .nav-burger{display:none;flex-direction:column;justify-content:center;gap:5px;width:22px;height:18px;background:none;border:none;cursor:pointer;padding:0}
        .nav-burger span{display:block;width:100%;height:2px;background:#C8D8C0;transition:transform .25s,opacity .25s}
        .nav-burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
        .nav-burger.open span:nth-child(2){opacity:0}
        .nav-burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

        /* BREADCRUMB */
        .breadcrumb{padding:.75rem 2rem;background:#F5F5F3;border-bottom:1px solid #E8E8E4;font-size:12px;color:#B0BEB8;display:flex;gap:.5rem;align-items:center}
        .breadcrumb a{color:#B0BEB8;text-decoration:none;transition:color .2s}
        .breadcrumb a:hover{color:#1D7A4F}
        .breadcrumb .sep{color:#E8E8E4}
        .breadcrumb .current{color:#0F1A14;font-weight:500}

        /* MAIN */
        .product-main{display:grid;grid-template-columns:1fr 1fr;gap:3rem;padding:3rem 2rem;max-width:1200px;margin:0 auto}

        /* GALERÍA */
        .gallery{display:flex;flex-direction:column;gap:1rem}
        .gallery-main{background:#E8ECE6;border-radius:4px;height:460px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
        .gallery-main img{width:100%;height:100%;object-fit:cover}
        .gallery-main .no-img{font-size:80px;color:#B0BEB8}
        .gallery-badge{position:absolute;top:1rem;left:1rem;background:#1D7A4F;color:#F5F5F3;font-size:10px;font-weight:500;padding:4px 10px;letter-spacing:.04em}
        .gallery-thumbs{display:flex;gap:.5rem}
        .gallery-thumb{width:72px;height:72px;background:#E8ECE6;border-radius:2px;border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:border-color .2s}
        .gallery-thumb.active{border-color:#1D7A4F}
        .gallery-thumb img{width:100%;height:100%;object-fit:cover}
        .gallery-thumb i{font-size:24px;color:#B0BEB8}

        /* INFO */
        .product-info{display:flex;flex-direction:column;gap:1.5rem}
        .product-eyebrow{font-size:11px;font-weight:500;letter-spacing:.18em;color:#1D7A4F;text-transform:uppercase}
        .product-name{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:#0F1A14;line-height:1.2}
        .product-stars{display:flex;align-items:center;gap:.5rem}
        .stars{color:#D6C5A0;font-size:14px}
        .reviews-count{font-size:12px;color:#B0BEB8}
        .price-row{display:flex;align-items:baseline;gap:.75rem;flex-wrap:wrap}
        .price-main{font-size:32px;font-weight:700;color:#0F1A14}
        .price-save{font-size:12px;font-weight:500;color:#1D7A4F;background:#F0FAF5;padding:3px 8px;border-radius:2px}
        .stock-indicator{display:flex;align-items:center;gap:.4rem;font-size:12px;font-weight:500}
        .stock-dot{width:6px;height:6px;border-radius:50%}
        .in-stock{color:#1D7A4F}.in-stock .stock-dot{background:#1D7A4F}
        .out-stock{color:#DC2626}.out-stock .stock-dot{background:#DC2626}
        .short-desc{font-size:14px;color:#4A6A5A;line-height:1.7}

        /* VARIANTES */
        .variants-label,.qty-label{font-size:12px;font-weight:500;color:#4A6A5A;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem}
        .variants{display:flex;gap:.5rem;flex-wrap:wrap}
        .variant-btn{padding:.4rem .9rem;border:1px solid #E8E8E4;border-radius:2px;font-size:13px;font-weight:500;color:#0F1A14;cursor:pointer;background:white;transition:all .2s;font-family:'DM Sans',sans-serif}
        .variant-btn.active{border-color:#1D7A4F;color:#1D7A4F;background:#F0FAF5}
        .variant-btn:hover{border-color:#1D7A4F}

        /* CANTIDAD */
        .qty-row{display:flex;align-items:center;gap:.75rem}
        .qty-btn{width:36px;height:36px;border:1px solid #E8E8E4;background:white;border-radius:2px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#0F1A14;transition:all .2s;font-family:'DM Sans',sans-serif}
        .qty-btn:hover{border-color:#1D7A4F;color:#1D7A4F}
        .qty-num{font-size:16px;font-weight:600;min-width:2rem;text-align:center}

        /* BOTONES */
        .btn-add{width:100%;padding:1rem;background:#1D7A4F;color:#F5F5F3;border:none;border-radius:2px;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.02em;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:.5rem}
        .btn-add:hover{background:#22904F}
        .btn-add:disabled{background:#B0BEB8;cursor:not-allowed}
        .btn-back{background:transparent;color:#0F1A14;border:1px solid #E8E8E4;border-radius:2px;font-size:14px;padding:.75rem 1rem;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:.5rem;transition:all .2s}
        .btn-back:hover{border-color:#1D7A4F;color:#1D7A4F}

        /* TRUST BADGES */
        .trust-badges{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;padding:1rem 0;border-top:1px solid #E8E8E4;border-bottom:1px solid #E8E8E4}
        .trust-badge{display:flex;flex-direction:column;align-items:center;gap:.3rem;text-align:center}
        .trust-badge i{font-size:20px;color:#1D7A4F}
        .trust-badge span{font-size:11px;color:#6B8A7A;line-height:1.3}
        .trust-badge strong{font-size:11px;color:#0F1A14;font-weight:500;display:block}

        /* TABS */
        .content-tabs{max-width:1200px;margin:0 auto;padding:2rem 2rem 4rem}
        .tab-nav{display:flex;border-bottom:2px solid #E8E8E4;margin-bottom:2rem;overflow-x:auto}
        .tab-btn{padding:.75rem 1.5rem;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:#B0BEB8;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap}
        .tab-btn.active{color:#0F1A14;border-bottom-color:#1D7A4F}
        .tab-content{display:none}
        .tab-content.active{display:block}

        /* DESCRIPCIÓN */
        .desc-content{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center}
        .desc-text h3{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#0F1A14;margin-bottom:1rem}
        .desc-text p{font-size:14px;color:#4A6A5A;line-height:1.8;margin-bottom:1rem}
        .desc-img{background:#E8ECE6;border-radius:4px;height:300px;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .desc-img img{width:100%;height:100%;object-fit:cover}
        .desc-img i{font-size:60px;color:#B0BEB8}

        /* SPECS */
        .specs-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:#E8E8E4}
        .spec-item{background:white;padding:1rem 1.25rem;display:flex;justify-content:space-between;align-items:center}
        .spec-key{font-size:13px;color:#6B8A7A}
        .spec-val{font-size:13px;color:#0F1A14;font-weight:500;text-align:right}

        /* FEATURES */
        .features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.5rem}
        .feature-card{background:#0F1A14;padding:1.5rem;border-radius:2px}
        .feature-icon{font-size:24px;margin-bottom:.75rem}
        .feature-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#C8D8C0;margin-bottom:.5rem}
        .feature-text{font-size:12px;color:#4A6A5A;line-height:1.6}

        /* RESEÑAS */
        .reviews-list{display:flex;flex-direction:column;gap:1rem}
        .review-card{background:white;border:1px solid #E8E8E4;border-radius:2px;padding:1.25rem}
        .review-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
        .review-name{font-size:14px;font-weight:500;color:#0F1A14}
        .review-stars{color:#D6C5A0;font-size:12px}
        .review-text{font-size:13px;color:#4A6A5A;line-height:1.6}
        .review-date{font-size:11px;color:#B0BEB8;margin-top:.4rem}

        /* RELACIONADOS */
        .related{background:#F5F5F3;padding:3rem 2rem;border-top:1px solid #E8E8E4}
        .related-inner{max-width:1200px;margin:0 auto}
        .related-eyebrow{font-size:11px;font-weight:500;letter-spacing:.18em;color:#1D7A4F;text-transform:uppercase;margin-bottom:.5rem}
        .related-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#0F1A14;margin-bottom:2rem}
        .related-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem}
        .related-card{background:white;border:1px solid #E8E8E4;border-radius:2px;overflow:hidden;cursor:pointer;transition:transform .2s}
        .related-card:hover{transform:translateY(-3px)}
        .related-img{height:140px;background:#E8ECE6;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .related-img img{width:100%;height:100%;object-fit:cover}
        .related-img i{font-size:36px;color:#B0BEB8}
        .related-info{padding:.75rem}
        .related-name{font-size:13px;font-weight:500;color:#0F1A14;margin-bottom:.3rem;line-height:1.3}
        .related-price{font-size:14px;font-weight:600;color:#1D7A4F}

        /* FOOTER */
        footer{background:#0F1A14;padding:1.5rem 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;border-top:1px solid #1A2820}
        .footer-logo{font-family:'Playfair Display',serif;font-size:16px;font-weight:700}
        .footer-logo .a{color:#C8D8C0}.footer-logo .b{color:#1D7A4F}
        footer p{font-size:11px;color:#2A4A38}

        /* LOADING / ERROR */
        .loading{text-align:center;padding:4rem 2rem;color:#6B8A7A}
        .loading i{font-size:48px;margin-bottom:1rem;display:block;color:#B0BEB8}

        /* TOAST */
        .toast{position:fixed;bottom:2rem;right:2rem;background:#0F1A14;color:#C8D8C0;padding:.75rem 1.2rem;border-radius:2px;font-size:13px;font-weight:500;opacity:0;transform:translateY(8px);transition:all .3s;z-index:9999;pointer-events:none}
        .toast.show{opacity:1;transform:translateY(0)}
        .toast.ok{border-left:3px solid #1D7A4F}
        .toast.err{border-left:3px solid #DC2626}

        /* RESPONSIVE */
        @media(max-width:768px){
            .product-main{grid-template-columns:1fr;gap:2rem;padding:1.5rem 1rem}
            .desc-content{grid-template-columns:1fr}
            .desc-img{display:none}
            .specs-grid{grid-template-columns:1fr}
            .nav-burger{display:flex}
            .nav-links{
                display:flex;position:absolute;top:56px;left:0;right:0;
                flex-direction:column;gap:0;background:#0F1A14;
                max-height:0;overflow:hidden;border-bottom:1px solid #1A2820;
                transition:max-height .25s ease;
            }
            .nav-links.open{max-height:260px}
            .nav-links a{padding:.9rem 1.25rem;opacity:1;border-top:1px solid #1A2820}
        }
    </style>
</head>

                <p style="font-size:11px;font-weight:500;color:#6B8A7A;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem">Cantidad</p>
                <div style="display:flex;align-items:center;gap:.75rem">
                    <button onclick="changeModalQty(-1)"

                <div id="modal-method-anticipado" onclick="selectModalMethod('anticipado')"

                    <p style="font-size:13px;font-weight:600;color:#0F1A14;margin-bottom:.2rem">Pago anticipado</p>
                    <p style="font-size:11px;color:#6B8A7A">Tarjeta · PSE · Nequi</p>
                    <span style="background:#1D7A4F;color:white;font-size:10px;font-weight:500;padding:2px 7px;border-radius:2px;display:inline-block;margin-top:.4rem">Más rápido</span>

                <div id="modal-method-contraentrega" onclick="selectModalMethod('contraentrega')"

<script>
const API = "https://e-commerce-con-fastapi-y-postgreqsl-production.up.railway.app";
let currentProduct = null;
let currentPage = null;
let quantity = 1;

// ── Utilidades ────────────────────────────────────────────────────────────────
function showToast(msg, type = "ok") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = `toast show ${type}`;
    setTimeout(() => t.className = "toast", 3000);
}

function toggleNavMenu() {
    const open = document.querySelector(".nav-links").classList.toggle("open");
    const burger = document.getElementById("nav-burger");
    burger.classList.toggle("open", open);
    burger.setAttribute("aria-expanded", open);
}
document.querySelectorAll(".nav-links a").forEach(a => a.addEventListener("click", () => {
    document.querySelector(".nav-links").classList.remove("open");
    document.getElementById("nav-burger").classList.remove("open");
}));

function getProductId() {
    const params = new URLSearchParams(window.location.search);
    return params.get("id");
}

function updateFreeShippingBadge() {
    const el = document.getElementById("trust-free-shipping");
    if (el) el.textContent = "Pedidos +" + vxPrice(80);
}

// ── Inicialización ────────────────────────────────────────────────────────────
async function init() {
    await loadTRM();
    updateCurrencyToggle();
    updateFreeShippingBadge();

    // ── TRM ───────────────────────────────────────────────────────────────────────
    async function loadTRMAdmin() {
        try {
            const data = await apiFetch("/settings/trm");
            document.getElementById("trm-info").innerHTML =
                `TRM actual: <strong>1 USD = $${data.trm.toLocaleString("es-CO")} COP</strong> · Fuente: ${data.source === "auto" ? "Automática (exchangerate-api)" : "Manual"}`;
            document.getElementById("trm-value").value = data.manual;
            document.getElementById("trm-auto").checked = data.source === "auto";
            document.getElementById("trm-manual-group").style.display =
                data.source === "auto" ? "none" : "block";
        } catch(e) {}
    }

    function toggleTRMAuto(checked) {
        document.getElementById("trm-manual-group").style.display = checked ? "none" : "block";
    }

    async function saveTRM() {
        const auto = document.getElementById("trm-auto").checked;
        const trm = parseFloat(document.getElementById("trm-value").value);
        try {
            await apiFetch("/settings/trm", {
                method: "PUT",
                body: JSON.stringify({ trm: trm || 4200, auto: auto })
            });
            showToast("TRM guardada ✅", "success");
            loadTRMAdmin();
        } catch(e) { showToast(e.message, "error"); }
    }

    // Cargar TRM cuando se abre el tab de ajustes
    // Agrega loadTRMAdmin() al final del switchTab cuando tab === 'settings'
    // Navbar
    if (isLoggedIn()) {
        document.getElementById("nav-login").style.display = "none";
        document.getElementById("nav-logout").style.display = "block";
        try {
            const me = await getMe();
            document.getElementById("nav-user").textContent = me.full_name.split(" ")[0];
            if (me.is_admin) document.getElementById("nav-admin").style.display = "block";
        } catch(e) {}
    }

    const productId = getProductId();
    if (!productId) {
        showError("No se especificó un producto.");
        return;
    }

    try {
        // Cargar producto y configuración de página en paralelo
        const [product, page] = await Promise.all([
            getProduct(productId),
            getProductPage(productId)
        ]);

        currentProduct = product;
        currentPage = page;

        document.title = `${product.name} — Velonox`;
        document.getElementById("breadcrumb-name").textContent = product.name;

        renderProduct(product, page);
        loadRelatedProducts(productId);

    } catch(e) {
        showError("No pudimos cargar este producto. " + e.message);
    }
}

// ── Productos relacionados ────────────────────────────────────────────────────
async function loadRelatedProducts(currentId) {
    try {
        const products = await getProducts();
        const related = products.filter(p => p.id !== currentId).slice(0, 4);
        const grid = document.getElementById("related-grid");
        if (!grid) return;

        if (related.length === 0) {
            grid.innerHTML = `<p style="color:#6B8A7A;font-size:13px">No hay más productos disponibles.</p>`;
            return;
        }

        grid.innerHTML = related.map(p => `
            <div class="related-card" onclick="window.location.href='/product.html?id=${p.id}'">
                <div class="related-img">
                    ${p.image_url
                        ? `<img src="${p.image_url}" alt="${p.name}">`
                        : `<i class="ti ti-tools-kitchen-2"></i>`
                    }
                </div>
                <div class="related-info">
                    <p class="related-name">${p.name}</p>
                    <p class="related-price">${vxPrice(p.price)}</p>
                </div>
            </div>
        `).join('');
        if (window.animateCards) window.animateCards(".related-card");
    } catch(e) {}
}

// ── Interacciones ─────────────────────────────────────────────────────────────
function showTab(tab, btn) {
    document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.getElementById(`tab-${tab}`).classList.add("active");
    btn.classList.add("active");
}

function changeQty(delta) {
    quantity = Math.max(1, Math.min(quantity + delta, currentProduct?.stock || 1));
    document.getElementById("qty-display").textContent = quantity;
}

function selectVariant(btn) {
    btn.closest(".variants").querySelectorAll(".variant-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

function selectThumb(thumb, imageUrl) {
    document.querySelectorAll(".gallery-thumb").forEach(t => t.classList.remove("active"));
    thumb.classList.add("active");
    const main = document.getElementById("gallery-main");
    if (imageUrl) {
        main.innerHTML = `<img src="${imageUrl}" alt="Producto"><span class="gallery-badge">VELONOX</span>`;
    }
}

async function handleAddToCart() {
    if (isLoggedIn()) {
        try {
            await addToCart(currentProduct.id, quantity);
            showToast(`"${currentProduct.name}" agregado al carrito `, "ok");
        } catch(e) {
            showToast(e.message, "err");
        }
    } else {
        for (let i = 0; i < quantity; i++) addToGuestCart(currentProduct);
        showToast(`"${currentProduct.name}" agregado al carrito `, "ok");
    }
}

// ── MODAL DE COMPRA RÁPIDA ────────────────────────────────────────────────────
let modalQty = 1;
let modalMethod = 'anticipado';

function handleBuyNow() {
    if (!currentProduct) return;
    if (!isLoggedIn() && false) { // permitir sin login
        window.location.href = "/login.html";
        return;
    }

    // Resetear modal
    modalQty = quantity;
    modalMethod = 'anticipado';
    document.getElementById("modal-qty").textContent = modalQty;
    document.getElementById("modal-product-name").textContent = currentProduct.name;
    updateModalTotal();
    selectModalMethod('anticipado');

    // Mostrar modal
    const modal = document.getElementById("buy-modal");
    modal.style.display = "flex";
    document.body.style.overflow = "hidden";
}

function closeBuyModal() {
    document.getElementById("buy-modal").style.display = "none";
    document.body.style.overflow = "";
}

function changeModalQty(delta) {
    const maxStock = currentProduct ? currentProduct.stock : 1;
    modalQty = Math.max(1, Math.min(modalQty + delta, maxStock));
    document.getElementById("modal-qty").textContent = modalQty;
    updateModalTotal();
}

function updateModalTotal() {
    if (!currentProduct) return;
    document.getElementById("modal-total").textContent = vxPrice(currentProduct.price * modalQty);
}

function selectModalMethod(method) {
    modalMethod = method;
    const anticipado = document.getElementById("modal-method-anticipado");
    const contra = document.getElementById("modal-method-contraentrega");
    const icon = contra.querySelector("i");

    if (method === 'anticipado') {
        anticipado.style.border = "2px solid #1D7A4F";
        anticipado.style.background = "#F0FAF5";
        contra.style.border = "2px solid #E8E8E4";
        contra.style.background = "white";
        icon.style.color = "#B0BEB8";
        document.getElementById("modal-btn-text").textContent = "Ir al pago";
    } else {
        contra.style.border = "2px solid #1D7A4F";
        contra.style.background = "#F0FAF5";
        contra.querySelector("i").style.color = "#1D7A4F";
        anticipado.style.border = "2px solid #E8E8E4";
        anticipado.style.background = "white";
        document.getElementById("modal-btn-text").textContent = "Continuar con datos";
    }
}

async function handleModalCheckout() {
    if (!currentProduct) return;

    const btn = document.getElementById("modal-btn");
    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-loader"></i> Procesando...';

    try {
        if (modalMethod === 'anticipado') {
            // Pago anticipado → agregar al carrito de la DB o localStorage y redirigir
            if (isLoggedIn()) {
                await addToCart(currentProduct.id, modalQty);
                const data = await checkout();
                window.location.href = data.checkout_url;
            } else {
                // Guardar en localStorage y llevar al checkout
                const cart = [];
                cart.push({
                    id: currentProduct.id,
                    name: currentProduct.name,
                    price: currentProduct.price,
                    image_url: currentProduct.image_url,
                    stock: currentProduct.stock,
                    quantity: modalQty
                });
                localStorage.setItem("velonox_cart", JSON.stringify(cart));
                localStorage.setItem("velonox_checkout_method", "anticipado");
                window.location.href = "/checkout.html";
            }
        } else {
            // Contraentrega → guardar carrito y llevar al checkout
            const cart = [{
                id: currentProduct.id,
                name: currentProduct.name,
                price: currentProduct.price,
                image_url: currentProduct.image_url,
                stock: currentProduct.stock,
                quantity: modalQty
            }];
            localStorage.setItem("velonox_cart", JSON.stringify(cart));
            localStorage.setItem("velonox_checkout_method", "contraentrega");
            closeBuyModal();
            window.location.href = "/checkout.html";
        }
    } catch(e) {
        showToast(e.message, "err");
        btn.disabled = false;
        btn.innerHTML = '<i class="ti ti-bolt"></i><span id="modal-btn-text">' +
            (modalMethod === 'anticipado' ? 'Ir al pago' : 'Continuar con datos') + '</span>';
    }
}

// Cerrar modal al hacer clic fuera
document.getElementById("buy-modal").addEventListener("click", function(e) {
    if (e.target === this) closeBuyModal();
});

function showError(msg) {
    document.getElementById("page-content").innerHTML = `
        <div class="loading">
            <i class="ti ti-alert-circle"></i>
            <p style="margin-bottom:1rem">${msg}</p>
            <button class="btn-back" onclick="window.location.href='/index.html'"
                style="margin:0 auto;display:inline-flex">
                <i class="ti ti-arrow-left"></i> Volver a la tienda
            </button>
        </div>`;
}

// ── Funciones de API para product pages ───────────────────────────────────────
async function getProductPage(productId) {
    const response = await fetch(`${API}/product-pages/${productId}`);
    if (!response.ok) throw new Error("Error cargando página del producto");
    return response.json();
}

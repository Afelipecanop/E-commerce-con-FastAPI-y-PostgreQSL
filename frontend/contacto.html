<head>

    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon/favicon-48x48.png">
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon/favicon-64x64.png">
    <link rel="icon" type="image/png" sizes="128x128" href="/favicon/favicon-128x128.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/favicon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon/favicon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon/favicon-512x512.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto — Velonox</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/vendor/tabler-icons/tabler-icons.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;background:#F5F5F3;color:#0F1A14}
        nav{background:#0F1A14;padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .nav-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;letter-spacing:-.5px;text-decoration:none}
        .nav-logo .a{color:#C8D8C0}.nav-logo .b{color:#1D7A4F}
        .nav-links{display:flex;gap:1.5rem}
        .nav-links a{font-size:13px;color:#C8D8C0;text-decoration:none;opacity:.7;transition:opacity .2s}
        .nav-links a:hover{opacity:1}
        .nav-right{display:flex;gap:12px;align-items:center}
        .nav-icon{color:#C8D8C0;opacity:.7;font-size:18px;cursor:pointer;text-decoration:none}
        .nav-icon:hover{opacity:1}
        .nav-user{font-size:12px;color:#6B8A7A}
        .nav-admin{font-size:12px;color:#4A6A5A;text-decoration:none;padding:4px 10px;border:1px solid #2A4A38;border-radius:2px}
        .nav-burger{display:none;flex-direction:column;justify-content:center;gap:5px;width:22px;height:18px;background:none;border:none;cursor:pointer;padding:0}
        .nav-burger span{display:block;width:100%;height:2px;background:#C8D8C0;transition:transform .25s,opacity .25s}
        .nav-burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
        .nav-burger.open span:nth-child(2){opacity:0}
        .nav-burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
        .hero{background:#0F1A14;padding:5rem 2rem 4rem;text-align:center}
        .hero-eyebrow{font-size:11px;font-weight:500;letter-spacing:.18em;color:#1D7A4F;text-transform:uppercase;margin-bottom:1.2rem}
        .hero h1{font-family:'Playfair Display',serif;font-size:clamp(36px,5vw,60px);font-weight:900;color:#C8D8C0;line-height:1.1;letter-spacing:-2px;margin-bottom:1rem}
        .hero h1 em{color:#1D7A4F;font-style:normal}
        .hero p{font-size:15px;color:#6B8A7A;max-width:500px;margin:0 auto;line-height:1.7}
        .main{max-width:1100px;margin:0 auto;padding:4rem 2rem;display:grid;grid-template-columns:1fr 1.4fr;gap:4rem;align-items:start}
        .contact-info{display:flex;flex-direction:column;gap:2rem}
        .info-block{background:#0F1A14;border-radius:4px;padding:1.5rem}
        .info-block-eyebrow{font-size:10px;font-weight:500;letter-spacing:.18em;color:#4A6A5A;text-transform:uppercase;margin-bottom:.75rem}
        .info-block h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#C8D8C0;margin-bottom:.5rem}
        .info-block p{font-size:13px;color:#6B8A7A;line-height:1.6}
        .whatsapp-btn{display:flex;align-items:center;gap:.75rem;background:#1D7A4F;color:#F5F5F3;padding:1rem 1.25rem;border-radius:4px;text-decoration:none;font-weight:600;font-size:14px;transition:background .2s;margin-top:.75rem}
        .whatsapp-btn:hover{background:#22904F}
        .whatsapp-btn i{font-size:22px}
        .whatsapp-sub{font-size:11px;font-weight:400;opacity:.8}
        .horario-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-top:.75rem}
        .horario-item{font-size:12px;color:#4A6A5A}
        .horario-item strong{color:#C8D8C0;display:block;font-size:12px;font-weight:500}
        .tiempo-resp{display:flex;align-items:center;gap:.5rem;background:#1A2820;border-radius:2px;padding:.6rem .75rem;margin-top:.75rem}
        .tiempo-resp i{color:#1D7A4F;font-size:14px}
        .tiempo-resp span{font-size:12px;color:#6B8A7A}
        .tiempo-resp strong{color:#C8D8C0}
        .contact-form{background:white;border:1px solid #E8E8E4;border-radius:4px;padding:2.5rem}
        .form-eyebrow{font-size:10px;font-weight:500;letter-spacing:.18em;color:#1D7A4F;text-transform:uppercase;margin-bottom:.5rem}
        .form-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#0F1A14;margin-bottom:2rem}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
        .form-group{margin-bottom:1.2rem}
        .form-group label{display:block;font-size:11px;font-weight:500;color:#6B8A7A;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
        .form-group input,.form-group textarea,.form-group select{width:100%;padding:.65rem .9rem;border:1px solid #E8E8E4;border-radius:2px;font-size:14px;color:#0F1A14;font-family:'DM Sans',sans-serif;transition:border-color .2s;background:white}
        .form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:#1D7A4F}
        .form-group textarea{resize:vertical;min-height:120px}
        .btn-submit{width:100%;padding:1rem;background:#1D7A4F;color:#F5F5F3;border:none;border-radius:2px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.02em;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:.5rem}
        .btn-submit:hover{background:#22904F}
        .btn-submit:disabled{background:#B0BEB8;cursor:not-allowed}
        .form-note{font-size:11px;color:#B0BEB8;text-align:center;margin-top:.75rem;line-height:1.5}
        .alert{padding:.75rem 1rem;border-radius:2px;margin-bottom:1rem;font-size:13px;font-weight:500;display:none}
        .alert.show{display:block}
        .alert-ok{background:#F0FAF5;border:1px solid #A8D8BC;color:#1D7A4F}
        .alert-err{background:#FEF2F2;border:1px solid #FBBFBF;color:#DC2626}
        .faq{background:#0F1A14;padding:4rem 2rem}
        .faq-inner{max-width:800px;margin:0 auto}
        .faq-eyebrow{font-size:11px;font-weight:500;letter-spacing:.18em;color:#1D7A4F;text-transform:uppercase;margin-bottom:.75rem}
        .faq h2{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#C8D8C0;margin-bottom:2rem}
        .faq-item{border-bottom:1px solid #1A2820;padding:1.25rem 0}
        .faq-q{font-size:14px;font-weight:500;color:#C8D8C0;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:1rem}
        .faq-q i{color:#1D7A4F;font-size:16px;transition:transform .3s;flex-shrink:0}
        .faq-q.open i{transform:rotate(45deg)}
        .faq-a{font-size:13px;color:#6B8A7A;line-height:1.7;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s}
        .faq-a.open{max-height:200px;padding-top:.75rem}
        footer{background:#0F1A14;padding:2rem;border-top:1px solid #1A2820}
        .footer-top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:1.5rem;margin-bottom:1.5rem;max-width:1100px;margin-left:auto;margin-right:auto}
        .footer-logo{font-family:'Playfair Display',serif;font-size:18px;font-weight:700}
        .footer-logo .a{color:#C8D8C0}.footer-logo .b{color:#1D7A4F}
        .footer-tagline{font-size:12px;color:#4A6A5A;margin-top:4px;font-style:italic}
        .footer-col p{font-size:11px;font-weight:500;color:#6B8A7A;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.75rem}
        .footer-col a{display:block;font-size:13px;color:#4A6A5A;text-decoration:none;margin-bottom:5px;transition:color .2s}
        .footer-col a:hover{color:#C8D8C0}
        .footer-bottom{border-top:1px solid #1A2820;padding-top:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;max-width:1100px;margin:0 auto}
        .footer-copy{font-size:11px;color:#2A4A38}
        .footer-social{display:flex;gap:12px}
        .footer-social i{font-size:18px;color:#2A4A38;cursor:pointer}
        .footer-social i:hover{color:#1D7A4F}
        @media(max-width:768px){
            .main{grid-template-columns:1fr;gap:2rem;padding:2rem 1rem}
            .form-row{grid-template-columns:1fr}
            .nav-burger{display:flex}
            .nav-links{
                display:flex;position:absolute;top:56px;left:0;right:0;
                flex-direction:column;gap:0;background:#0F1A14;
                max-height:0;overflow:hidden;border-bottom:1px solid #1A2820;
                transition:max-height .25s ease;
            }
            .nav-links.open{max-height:260px}
            .nav-links a{padding:.9rem 1.25rem;opacity:1;border-top:1px solid #1A2820}
        }
    </style>
</head>

<nav>
    <a href="/index.html" class="nav-logo"><span class="a">Velo</span><span class="b">nox</span></a>
    <div class="nav-links">
        <a href="/categorias.html">Cocina</a><a href="/tienda.html">Catálogo</a><a href="/index.html">Sets</a><a href="/index.html">Regalos</a><a href="/nosotros.html">Nosotros</a>
    </div>
    <div class="nav-right">
        <span class="nav-user" id="nav-user"></span>
        <a href="/cart.html" class="nav-icon"><i class="ti ti-shopping-bag"></i></a>
        <a href="/admin.html" class="nav-admin" id="nav-admin" style="display:none">Admin</a>
        <a href="/login.html" class="nav-icon" id="nav-login"><i class="ti ti-user"></i></a>
        <a href="#" class="nav-icon" id="nav-logout" style="display:none" onclick="logout();return false"><i class="ti ti-logout"></i></a>
        <button class="nav-burger" id="nav-burger" aria-label="Abrir menú" aria-expanded="false" onclick="toggleNavMenu()">
            <span></span><span></span><span></span>
        </button>
    </div>
</nav>
<div id="layout-container"></div>
<script src="/js/api.js"></script>
<script src="/js/page-blocks.js"></script>
<script>
    async function init() {
        if (isLoggedIn()) {
            document.getElementById("nav-login").style.display = "none";
            document.getElementById("nav-logout").style.display = "block";
            try {
                const me = await getMe();
                document.getElementById("nav-user").textContent = me.full_name.split(" ")[0];
                if (me.is_admin) document.getElementById("nav-admin").style.display = "block";
            } catch(e) {}
        }
        await initPageBlocks("contacto");
    }
    function toggleNavMenu() {
        const open = document.querySelector(".nav-links").classList.toggle("open");
        const burger = document.getElementById("nav-burger");
        burger.classList.toggle("open", open);
        burger.setAttribute("aria-expanded", open);
    }
    document.querySelectorAll(".nav-links a").forEach(a => a.addEventListener("click", () => {
        document.querySelector(".nav-links").classList.remove("open");
        document.getElementById("nav-burger").classList.remove("open");
    }));
    function toggleFaq(el) {
        const answer = el.nextElementSibling;
        const isOpen = answer.classList.contains("open");
        document.querySelectorAll(".faq-a").forEach(a => a.classList.remove("open"));
        document.querySelectorAll(".faq-q").forEach(q => q.classList.remove("open"));
        if (!isOpen) { answer.classList.add("open"); el.classList.add("open"); }
    }
    function showAlert(msg, type) {
        const el = document.getElementById("form-alert");
        el.textContent = msg;
        el.className = `alert show alert-${type}`;
    }
    async function handleSubmit() {
        const name = document.getElementById("f-name").value.trim();
        const email = document.getElementById("f-email").value.trim();
        const motivo = document.getElementById("f-motivo").value;
        const mensaje = document.getElementById("f-mensaje").value.trim();
        if (!name || !email || !motivo || !mensaje) { showAlert("Por favor completa todos los campos.", "err"); return; }
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) { showAlert("Ingresa un email válido.", "err"); return; }
        const btn = document.getElementById("btn-submit");
        btn.disabled = true;
        btn.innerHTML = '<i class="ti ti-loader"></i> Enviando...';
        await new Promise(r => setTimeout(r, 1200));
        const motivoTexto = document.getElementById("f-motivo").options[document.getElementById("f-motivo").selectedIndex].text;
        const waMsg = encodeURIComponent(`Hola Velonox 👋\n\nNombre: ${name}\nEmail: ${email}\nMotivo: ${motivoTexto}\n\nMensaje: ${mensaje}`);
        showAlert("✅ Perfecto. Te redirigiremos a WhatsApp para continuar la conversación.", "ok");
        btn.innerHTML = '<i class="ti ti-check"></i> Enviado';
        setTimeout(() => { window.open(`https://wa.me/573108887296?text=${waMsg}`, "_blank"); }, 1500);
    }
    init();
</script>
</body>
</html>

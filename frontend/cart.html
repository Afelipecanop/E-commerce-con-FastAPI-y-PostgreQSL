<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon/favicon-48x48.png">
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon/favicon-64x64.png">
    <link rel="icon" type="image/png" sizes="128x128" href="/favicon/favicon-128x128.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/favicon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon/favicon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon/favicon-512x512.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito — Velonox</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .cart-qty-btn{
            width:34px;height:34px;display:flex;align-items:center;justify-content:center;
            font-size:1.1rem;line-height:1;padding:0;
        }
        .cart-empty{text-align:center;padding:3.5rem 1rem;color:var(--muted)}
        .cart-empty p{margin-bottom:1.5rem;font-size:1.05rem}
        @media (max-width:640px){
            .cart-item{flex-wrap:wrap}
            .cart-item .item-info{flex:1 1 60%;min-width:0}
            .cart-item .item-line-total{margin-left:auto}
        }
    </style>
</head>

<!-- Cloudflare Web Analytics --><script type='module' src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "0bb04015632048a0b04508aaa5b93945"}'></script><!-- End Cloudflare Web Analytics -->

<body>
    <nav>
        <a href="/index.html" class="logo text-brand">Velo<span class="accent">nox</span></a>
        <div class="nav-links">
            <a href="/catalogo.html">← Seguir comprando</a>
            <a href="#" id="nav-logout" onclick="logout(); return false;" style="display:none">Salir</a>
        </div>
    </nav>

    <div class="container">
        <h1 style="margin-bottom: 1.5rem">Tu carrito</h1>
        <div id="cart-content">
            <div class="loading">Cargando carrito...</div>
        </div>
    </div>

    </script>

    <script src="/js/api.js"></script>
    <script>
        // Mostrar "Salir" solo si hay sesión iniciada (no obligamos a loguearse)
        if (isLoggedIn()) document.getElementById("nav-logout").style.display = "";

        let cartItems = [];   // {id, name, price, image_url, stock, quantity, cart_item_id?}

        async function loadCart() {
            await loadTRM();
            updateCurrencyToggle();
            // ── TRM ───────────────────────────────────────────────────────────────────────
            async function loadTRMAdmin() {
                try {
                    const data = await apiFetch("/settings/trm");
                    document.getElementById("trm-info").innerHTML =
                        `TRM actual: <strong>1 USD = $${data.trm.toLocaleString("es-CO")} COP</strong> · Fuente: ${data.source === "auto" ? "Automática (exchangerate-api)" : "Manual"}`;
                    document.getElementById("trm-value").value = data.manual;
                    document.getElementById("trm-auto").checked = data.source === "auto";
                    document.getElementById("trm-manual-group").style.display =
                        data.source === "auto" ? "none" : "block";
                } catch(e) {}
            }

            function toggleTRMAuto(checked) {
                document.getElementById("trm-manual-group").style.display = checked ? "none" : "block";
            }

            async function saveTRM() {
                const auto = document.getElementById("trm-auto").checked;
                const trm = parseFloat(document.getElementById("trm-value").value);
                try {
                    await apiFetch("/settings/trm", {
                        method: "PUT",
                        body: JSON.stringify({ trm: trm || 4200, auto: auto })
                    });
                    showToast("TRM guardada ✅", "success");
                    loadTRMAdmin();
                } catch(e) { showToast(e.message, "error"); }
            }

            // Cargar TRM cuando se abre el tab de ajustes
            // Agrega loadTRMAdmin() al final del switchTab cuando tab === 'settings'
            const container = document.getElementById("cart-content");

            if (isLoggedIn()) {
                // Usuario con sesión → cargar desde la DB
                try {
                    const cart = await getCart();
                    cartItems = cart.items.map(item => ({
                        id: item.product.id,
                        name: item.product.name,
                        price: item.product.price,
                        image_url: item.product.image_url,
                        stock: item.product.stock,
                        quantity: item.quantity,
                        cart_item_id: item.id
                    }));
                } catch (e) {
                    cartItems = [];
                }
            } else {
                // Invitado → cargar desde localStorage
                cartItems = getGuestCart();
            }

            if (cartItems.length === 0) {
                container.innerHTML = `
                    <div class="cart-empty">
                        <p>Tu carrito está vacío.</p>
                        <a href="/index.html" class="btn btn-primary">Ver productos</a>
                    </div>`;
                return;
            }

            let total = 0;
            const itemsHTML = cartItems.map(item => {
                const lineTotal = item.price * item.quantity;
                total += lineTotal;
                return `
                    <div class="cart-item">
                        <img src="${item.image_url || 'https://via.placeholder.com/80'}" alt="${item.name}">
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div class="item-price">${vxPrice(item.price)} c/u</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:0.5rem">
                            <button class="btn btn-outline cart-qty-btn" onclick="changeQty('${item.id}', ${item.quantity - 1})">−</button>
                            <span style="min-width:2rem; text-align:center; font-weight:600">${item.quantity}</span>
                            <button class="btn btn-outline cart-qty-btn" onclick="changeQty('${item.id}', ${item.quantity + 1})">+</button>
                        </div>
                        <div class="item-line-total" style="font-weight:700; min-width:80px; text-align:right">
                            ${vxPrice(lineTotal)}
                        </div>
                        <button class="btn btn-danger cart-qty-btn" onclick="removeItem('${item.id}')">✕</button>
                    </div>`;
            }).join("");

            container.innerHTML = `
                ${itemsHTML}
                <div class="cart-total">
                    <div class="total-amount">Total: ${vxPrice(total)}</div>
                    <button class="btn btn-primary" id="pay-btn" onclick="handleCheckout()">
                        Proceder al pago
                    </button>
                </div>`;
        }

        async function changeQty(productId, newQty) {
            const item = cartItems.find(i => i.id === productId);
            if (item && newQty > item.stock) {
                alert(`Solo hay ${item.stock} unidades disponibles.`);
                return;
            }
            if (isLoggedIn()) {
                try {
                    if (newQty <= 0) {
                        await removeFromCart(item.cart_item_id);
                    } else {
                        await updateCartItem(item.cart_item_id, newQty);
                    }
                } catch (e) {
                    alert(e.message);
                    return;
                }
            } else {
                updateGuestCartItem(productId, newQty);
            }
            loadCart();
        }

        async function removeItem(productId) {
            const item = cartItems.find(i => i.id === productId);
            if (isLoggedIn()) {
                try {
                    await removeFromCart(item.cart_item_id);
                } catch (e) {
                    alert(e.message);
                    return;
                }
            } else {
                removeFromGuestCart(productId);
            }
            loadCart();
        }

        function handleCheckout() {
            if (cartItems.length === 0) return;
            window.location.href = "/checkout.html";
        }

        loadCart();
        window.addEventListener("currencyChanged", function() { loadCart(); });
    </script>
</body>
</html>

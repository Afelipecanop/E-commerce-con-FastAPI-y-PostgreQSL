<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velonox — Nueva contraseña</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --noche: #0F1A14; --verde: #1D7A4F; --verde-light: #2E9A67; --hueso: #F5F5F3;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',Arial,sans-serif;background:var(--hueso);color:var(--noche);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
  .card{width:100%;max-width:420px;}
  .eyebrow{font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--verde);display:flex;align-items:center;gap:8px;text-decoration:none;width:fit-content;margin-bottom:14px;}
  .eyebrow svg{width:16px;height:16px;}
  h1{font-family:'Playfair Display',Georgia,serif;font-weight:700;font-size:clamp(28px,5vw,36px);line-height:1.1;letter-spacing:-1px;margin-bottom:10px;}
  h1 em{font-style:italic;color:var(--verde);}
  p.subtitle{font-size:14.5px;color:#555;line-height:1.6;margin-bottom:24px;}
  .field{margin-bottom:18px;}
  .field label{display:block;font-size:12px;font-weight:500;color:#5b6b62;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
  .input-wrap{border-radius:14px;border:1.5px solid #E1DED6;background:#fff;position:relative;transition:border-color .25s ease, box-shadow .25s ease;}
  .input-wrap:focus-within{border-color:var(--verde);box-shadow:0 0 0 4px rgba(29,122,79,0.12);}
  .input-wrap input{width:100%;background:transparent;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:14.5px;color:var(--noche);padding:14px 16px;}
  .btn-primary{width:100%;padding:15px;border:none;border-radius:14px;background:var(--verde);color:#fff;font-size:14.5px;font-weight:600;cursor:pointer;transition:background .25s ease;}
  .btn-primary:hover{background:var(--verde-light);}
  .btn-primary:disabled{opacity:.6;cursor:not-allowed;}
  .alert-box{display:none;font-size:13px;line-height:1.5;padding:12px 14px;border-radius:12px;margin-bottom:18px;}
  .alert-box.show{display:block;}
  .alert-box.error{background:rgba(192,57,43,0.08);color:#A93226;border:1px solid rgba(192,57,43,0.25);}
  .alert-box.info{background:rgba(29,122,79,0.08);color:#175C3C;border:1px solid rgba(29,122,79,0.25);}
  .footer-link{text-align:center;font-size:13.5px;color:#666;margin-top:20px;}
  .link-green{color:var(--verde);text-decoration:none;font-weight:500;}
  .link-green:hover{text-decoration:underline;}
</style>
</head>
<body>

<div class="card">
  <a href="/index.html" class="eyebrow">
    <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
      <polygon points="28,8 44,48 34,48 28,30 22,48 12,48" fill="#0F1A14"/>
      <polygon points="28,30 44,48 34,48" fill="#1D7A4F"/>
    </svg>
    Velonox
  </a>

  <h1>Crea tu <em>nueva contraseña</em></h1>
  <p class="subtitle">Elige una contraseña nueva para tu cuenta.</p>

  <div class="alert-box" id="form-alert"></div>

  <form id="reset-form">
    <div class="field">
      <label for="new_password">Nueva contraseña</label>
      <div class="input-wrap">
        <input id="new_password" type="password" placeholder="Mínimo 8 caracteres" required minlength="8">
      </div>
    </div>
    <div class="field">
      <label for="confirm_password">Confirmar contraseña</label>
      <div class="input-wrap">
        <input id="confirm_password" type="password" placeholder="Repite tu contraseña" required minlength="8">
      </div>
    </div>
    <button type="submit" class="btn-primary" id="submit-btn">Restablecer contraseña</button>
  </form>

  <p class="footer-link">
    <a href="/login.html" class="link-green">Volver a iniciar sesión</a>
  </p>
</div>

<script src="/js/api.js"></script>
<script>
  function showAlert(message, type = "error") {
    const box = document.getElementById('form-alert');
    box.textContent = message;
    box.className = `alert-box show ${type}`;
  }

  const token = new URLSearchParams(location.search).get('token');
  const form = document.getElementById('reset-form');
  const submitBtn = document.getElementById('submit-btn');

  if (!token) {
    showAlert('Este link no es válido. Solicita uno nuevo desde la página de recuperación.');
    form.querySelectorAll('input, button').forEach(el => el.disabled = true);
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const newPassword = document.getElementById('new_password').value;
    const confirmPassword = document.getElementById('confirm_password').value;

    if (newPassword !== confirmPassword) {
      showAlert('Las contraseñas no coinciden.');
      return;
    }

    submitBtn.disabled = true;
    try {
      await resetPassword(token, newPassword);
      showAlert('Tu contraseña fue actualizada. Ya puedes iniciar sesión.', 'info');
      setTimeout(() => window.location.href = '/login.html', 2000);
    } catch (err) {
      showAlert(err.message || 'El link expiró o es inválido. Solicita uno nuevo.');
      submitBtn.disabled = false;
    }
  });
</script>

</body>
</html>

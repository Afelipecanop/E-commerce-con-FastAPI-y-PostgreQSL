<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon/favicon-48x48.png">
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon/favicon-64x64.png">
  <link rel="icon" type="image/png" sizes="128x128" href="/favicon/favicon-128x128.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/favicon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon/favicon-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon/favicon-512x512.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta charset="UTF-8">
  <title>Pedido confirmado — Velonox</title>
</head>
<body>
  <div id="resultado">Verificando tu pedido...</div>

  <script src="/js/api.js"></script>
  <script>
    async function mostrarResultado() {
      const params = new URLSearchParams(window.location.search);
      const orderId = params.get("order_id");
      const boldStatus = params.get("bold-tx-status"); // Bold lo agrega al redirigir
      const div = document.getElementById("resultado");

      if (!orderId) {
        div.innerHTML = "<p>No encontramos tu pedido.</p>";
        return;
      }

      if (boldStatus && boldStatus !== "approved") {
        div.innerHTML = `<p>Tu pago no se completó (estado: ${boldStatus}). Puedes intentarlo de nuevo desde tu carrito.</p>`;
        return;
      }

      try {
        if (isLoggedIn()) {
          const order = await getOrder(orderId);
          div.innerHTML = `<h2>¡Gracias por tu compra!</h2><p>Pedido #${order.id} — estado: ${order.status}</p>`;
        } else {
          div.innerHTML = `<h2>¡Gracias por tu compra!</h2><p>Pedido #${orderId} confirmado. Revisa tu correo para más detalles.</p>`;
        }
      } catch (e) {
        div.innerHTML = `<h2>¡Gracias por tu compra!</h2><p>Pedido #${orderId} recibido.</p>`;
      }
    }
    mostrarResultado();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velonox — Cocina de por vida</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vendor/tabler-icons/tabler-icons.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;background:#F5F5F3;color:#0F1A14}

        /* NAV */
        .nav{background:#0F1A14;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
        .nav-logo{display:flex;align-items:baseline;gap:0;text-decoration:none}
        .nav-logo span.a{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#C8D8C0;letter-spacing:-.5px}
        .nav-logo span.b{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#1D7A4F;letter-spacing:-.5px}
        .nav-links{display:flex;gap:1.5rem}
        .nav-links a{font-size:13px;color:#C8D8C0;text-decoration:none;opacity:.7;transition:opacity .2s}
        .nav-links a:hover{opacity:1}
        .nav-right{display:flex;gap:12px;align-items:center}
        .nav-icon{color:#C8D8C0;opacity:.7;font-size:18px;cursor:pointer;transition:opacity .2s;text-decoration:none}
        .nav-icon:hover{opacity:1}
        .nav-cart-wrap{display:flex;align-items:flex-start}
        .nav-cart-badge{background:#1D7A4F;color:#C8D8C0;font-size:10px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-left:-8px;margin-top:-8px;font-weight:600}
        .nav-admin{font-size:12px;color:#4A6A5A;text-decoration:none;padding:4px 10px;border:1px solid #2A4A38;border-radius:2px;transition:all .2s}
        .nav-admin:hover{color:#C8D8C0;border-color:#4A6A5A}
        .nav-user{font-size:12px;color:#6B8A7A}
        .nav-burger{display:none;flex-direction:column;justify-content:center;gap:5px;width:22px;height:18px;background:none;border:none;cursor:pointer;padding:0}
        .nav-burger span{display:block;width:100%;height:2px;background:#C8D8C0;transition:transform .25s,opacity .25s}
        .nav-burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
        .nav-burger.open span:nth-child(2){opacity:0}
        .nav-burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

        /* HERO */
        .hero{background:#0F1A14;padding:5rem 2rem 4rem;position:relative;overflow:hidden;min-height:520px;display:flex;flex-direction:column;justify-content:center}
        .hero-eyebrow{font-size:11px;font-weight:500;letter-spacing:.18em;color:#1D7A4F;text-transform:uppercase;margin-bottom:1.5rem}
        .hero-title{font-family:'Playfair Display',serif;font-size:clamp(52px,8vw,88px);font-weight:900;line-height:.95;letter-spacing:-2px;margin-bottom:0}
        .hero-title .w1{color:#C8D8C0;display:block}
        .hero-title .w2{color:#1D7A4F;display:block}
        .hero-cut{width:100%;height:1px;background:linear-gradient(90deg,transparent,#1D7A4F 20%,#4CAF7D 50%,#1D7A4F 80%,transparent);margin:1.75rem 0}
        .hero-sub{font-size:16px;color:#B0BEB8;line-height:1.6;max-width:480px;margin-bottom:2rem;font-weight:300}
        .hero-sub em{color:#D6C5A0;font-style:normal;font-weight:500}
        .hero-actions{display:flex;gap:12px;flex-wrap:wrap}
        .btn-primary{background:#1D7A4F;color:#F5F5F3;font-size:14px;font-weight:500;padding:12px 28px;border-radius:2px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.02em;transition:background .2s}
        .btn-primary:hover{background:#22904F}
        .btn-ghost{background:transparent;color:#C8D8C0;font-size:14px;font-weight:400;padding:12px 28px;border-radius:2px;border:1px solid #2A4A38;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
        .btn-ghost:hover{border-color:#1D7A4F;color:#F5F5F3}
        .hero-badge{position:absolute;right:2rem;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:4px}
        .hero-badge-ring{width:88px;height:88px;border-radius:50%;border:1px solid #2A4A38;display:flex;align-items:center;justify-content:center;flex-direction:column}
        .hero-badge-ring span.num{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#1D7A4F;line-height:1}
        .hero-badge-ring span.txt{font-size:9px;color:#6B8A7A;letter-spacing:.1em;text-transform:uppercase;text-align:center;line-height:1.3}

        /* TRUST BAR */
        .trust{background:#1A2820;padding:.875rem 2rem;display:flex;justify-content:center;gap:2.5rem;flex-wrap:wrap;border-top:1px solid #243B2C;border-bottom:1px solid #243B2C}
        .trust-item{display:flex;align-items:center;gap:7px;font-size:12px;color:#6B8A7A;white-space:nowrap}
        .trust-item i{color:#1D7A4F;font-size:15px}
        .trust-item strong{color:#C8D8C0;font-weight:500}

        /* SECCIONES */
        .sec{padding:3.5rem 2rem}
        .sec-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2rem}
        .sec-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#0F1A14}
        .sec-link{font-size:13px;color:#1D7A4F;text-decoration:none;display:flex;align-items:center;gap:4px}

        /* CATEGORÍAS */
        .cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
        .cat-card{background:#0F1A14;border-radius:2px;padding:1.5rem 1rem;display:flex;flex-direction:column;align-items:center;gap:.75rem;cursor:pointer;border:1px solid #1A2820;transition:border-color .2s;text-decoration:none}
        .cat-card:hover{border-color:#1D7A4F}
        .cat-icon{width:48px;height:48px;border-radius:50%;background:#1A2820;display:flex;align-items:center;justify-content:center;border:1px solid #2A4A38}
        .cat-icon i{font-size:22px;color:#1D7A4F}
        .cat-name{font-size:13px;font-weight:500;color:#C8D8C0;text-align:center;line-height:1.3}

        /* WHY STEEL */
        .why{background:#0F1A14;padding:3.5rem 2rem}
        .why-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1px;background:#1A2820;margin-top:2rem}
        .why-item{background:#0F1A14;padding:1.5rem;display:flex;flex-direction:column;gap:.75rem}
        .why-num{font-family:'Playfair Display',serif;font-size:36px;font-weight:900;color:#1D7A4F;line-height:1}
        .why-ttl{font-size:14px;font-weight:500;color:#C8D8C0;line-height:1.4}
        .why-txt{font-size:12px;color:#4A6A5A;line-height:1.6}

        /* PRODUCTOS */
        .prod-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
        .prod-card{background:#fff;border:1px solid #E8E8E4;border-radius:2px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s}
        .prod-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(15,26,20,.1)}
        .prod-img{height:200px;background:#E8ECE6;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
        .prod-img img{width:100%;height:100%;object-fit:cover}
        .prod-img .no-img{font-size:48px;color:#B0BEB8}
        .prod-badge{position:absolute;top:10px;left:10px;background:#1D7A4F;color:#F5F5F3;font-size:10px;font-weight:500;padding:3px 8px;letter-spacing:.04em}
        .prod-badge.sand{background:#D6C5A0;color:#3A2E14}
        .prod-info{padding:.875rem}
        .stars{color:#D6C5A0;font-size:11px;margin-bottom:4px}
        .prod-name{font-size:14px;font-weight:500;color:#0F1A14;margin-bottom:4px;line-height:1.3}
        .prod-sub{font-size:12px;color:#7A7A72;margin-bottom:8px}
        .prod-row{display:flex;justify-content:space-between;align-items:center}
        .prod-price{font-size:16px;font-weight:600;color:#0F1A14}
        .prod-old{font-size:12px;color:#AAA;text-decoration:line-through;margin-left:4px}
        .prod-btn{background:#0F1A14;color:#C8D8C0;font-size:11px;font-weight:500;padding:6px 12px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.04em;border-radius:2px;transition:background .2s}
        .prod-btn:hover{background:#1D7A4F;color:#F5F5F3}
        .prod-empty{text-align:center;padding:3rem;color:#6B8A7A;font-size:14px;grid-column:1/-1}

        /* GIFT CTA */
        .gift{background:#1A2820;padding:3rem 2rem;display:flex;flex-direction:column;align-items:center;text-align:center;gap:1rem;border-top:1px solid #243B2C}
        .gift-eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#4A6A5A;font-weight:500}
        .gift-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:#C8D8C0;line-height:1.2;max-width:480px}
        .gift-title em{color:#1D7A4F;font-style:normal}
        .gift-sub{font-size:14px;color:#6B8A7A;max-width:380px;line-height:1.6}

        /* FOOTER */
        .footer{background:#0F1A14;padding:2rem;border-top:1px solid #1A2820}
        .footer-top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:1.5rem;margin-bottom:1.5rem}
        .footer-brand span.a{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#C8D8C0}
        .footer-brand span.b{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#1D7A4F}
        .footer-tagline{font-size:12px;color:#4A6A5A;margin-top:4px;font-style:italic}
        .footer-col p{font-size:11px;font-weight:500;color:#6B8A7A;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.75rem}
        .footer-col a{display:block;font-size:13px;color:#4A6A5A;text-decoration:none;margin-bottom:5px;transition:color .2s}
        .footer-col a:hover{color:#C8D8C0}
        .footer-bottom{border-top:1px solid #1A2820;padding-top:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
        .footer-copy{font-size:11px;color:#2A4A38}
        .footer-social{display:flex;gap:12px}
        .footer-social i{font-size:18px;color:#2A4A38;cursor:pointer;transition:color .2s}
        .footer-social i:hover{color:#1D7A4F}

        /* TOAST */
        .toast{position:fixed;bottom:2rem;right:2rem;background:#0F1A14;color:#C8D8C0;padding:.75rem 1.2rem;border-radius:2px;font-size:13px;font-weight:500;opacity:0;transform:translateY(8px);transition:all .3s;z-index:9999;pointer-events:none}
        .toast.show{opacity:1;transform:translateY(0)}
        .toast.ok{border-left:3px solid #1D7A4F}
        .toast.err{border-left:3px solid #DC2626}

        /* ── RESPONSIVE ── */
        @media (max-width:860px){
            .nav{padding:0 1rem}
            .nav-burger{display:flex}
            .nav-links{
                display:flex;position:absolute;top:56px;left:0;right:0;
                flex-direction:column;gap:0;background:#0F1A14;
                max-height:0;overflow:hidden;border-bottom:1px solid #1A2820;
                transition:max-height .25s ease;
            }
            .nav-links.open{max-height:260px}
            .nav-links a{padding:.9rem 1.25rem;opacity:1;border-top:1px solid #1A2820}
            .sec{padding:2.5rem 1.25rem}
            .why{padding:2.5rem 1.25rem}
            .gift{padding:2.5rem 1.25rem}
            .footer{padding:1.5rem 1.25rem}
            .footer-top{gap:1.25rem}
            .trust{gap:1rem 1.5rem;padding:.75rem 1rem}
            /* El badge absoluto se salía encima del título: lo bajamos al flujo */
            .hero{padding:3.5rem 1.25rem 3rem;min-height:auto;text-align:left}
            .hero-badge{position:static;transform:none;margin-top:2rem;align-items:flex-start}
            .hero-title{letter-spacing:-1px}
            .hero-sub{font-size:15px}
        }
        @media (max-width:520px){
            .hero{padding:3rem 1.1rem 2.5rem}
            .hero-badge{display:none}   /* en pantallas muy pequeñas lo ocultamos */
            .hero-actions{flex-direction:column;align-items:stretch}
            .hero-actions .btn-primary,.hero-actions .btn-ghost{width:100%;text-align:center}
            .sec-header{flex-direction:column;align-items:flex-start;gap:.5rem}
            .trust{gap:.75rem 1.25rem}
            .trust-item{font-size:11px}
        }
    </style>
</head>

<script type="module">

</script>


<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script>
    const API = "https://e-commerce-con-fastapi-y-postgreqsl-production.up.railway.app";

    function showToast(msg, type = "ok") {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = `toast show ${type}`;
        setTimeout(() => t.className = "toast", 3000);
    }

    function toggleNavMenu() {
        const open = document.querySelector(".nav-links").classList.toggle("open");
        const burger = document.getElementById("nav-burger");
        burger.classList.toggle("open", open);
        burger.setAttribute("aria-expanded", open);
    }
    document.querySelectorAll(".nav-links a").forEach(a => a.addEventListener("click", () => {
        document.querySelector(".nav-links").classList.remove("open");
        document.getElementById("nav-burger").classList.remove("open");
    }));

    async function init() {
        await loadTRM();
        updateCurrencyToggle();
        // ── TRM ───────────────────────────────────────────────────────────────────────
        async function loadTRMAdmin() {
            try {
                const data = await apiFetch("/settings/trm");
                document.getElementById("trm-info").innerHTML =
                    `TRM actual: <strong>1 USD = $${data.trm.toLocaleString("es-CO")} COP</strong> · Fuente: ${data.source === "auto" ? "Automática (exchangerate-api)" : "Manual"}`;
                document.getElementById("trm-value").value = data.manual;
                document.getElementById("trm-auto").checked = data.source === "auto";
                document.getElementById("trm-manual-group").style.display =
                    data.source === "auto" ? "none" : "block";
            } catch(e) {}
        }

        function toggleTRMAuto(checked) {
            document.getElementById("trm-manual-group").style.display = checked ? "none" : "block";
        }

        async function saveTRM() {
            const auto = document.getElementById("trm-auto").checked;
            const trm = parseFloat(document.getElementById("trm-value").value);
            try {
                await apiFetch("/settings/trm", {
                    method: "PUT",
                    body: JSON.stringify({ trm: trm || 4200, auto: auto })
                });
                showToast("TRM guardada ✅", "success");
                loadTRMAdmin();
            } catch(e) { showToast(e.message, "error"); }
        }

        // Cargar TRM cuando se abre el tab de ajustes
        // Agrega loadTRMAdmin() al final del switchTab cuando tab === 'settings'

        if (isLoggedIn()) {
            document.getElementById("nav-login").style.display = "none";
            document.getElementById("nav-logout").style.display = "block";
            try {
                const me = await getMe();
                document.getElementById("nav-user").textContent = me.full_name.split(" ")[0];
                if (me.is_admin) document.getElementById("nav-admin").style.display = "block";
            } catch(e) {}
        }
        updateCartBadge();
        await loadLayoutBlocks();
        updateCurrencyToggle(); // el footer (con el toggle) se inyecta recién en loadLayoutBlocks()
        updateFreeShippingBadge();
    }

    // Agregar al carrito NO requiere login: se guarda en el carrito local.
    function handleAdd(id, name, stock) {
        if (stock <= 0) { showToast("Producto sin stock", "err"); return; }
        addToLocalCart(id, 1);
        showToast(`"${name}" agregado al carrito`, "ok");
    }

    async function loadLayoutBlocks() {
        try {
            const response = await fetch(`${API}/layout/`);
            const blocks = await response.json();
            const container = document.getElementById("layout-container");
            container.innerHTML = "";
            let products = [];
            try { products = await getProducts(); } catch(e) {}
            for (const block of blocks) {
                if (!block.is_visible) continue;
                const el = renderLayoutBlock(block, products);
                if (el) container.appendChild(el);
            }
            if (window.animateCards) window.animateCards(".prod-card, .cat-card");
        } catch(e) {
            console.error("Error cargando layout:", e);
        }
    }

    function updateFreeShippingBadge() {
        const el = document.getElementById("trust-free-shipping");
        if (el) el.textContent = vxPrice(80);
    }

    const KNOWN_CAT_SLUGS = ["ollas", "sartenes", "utensilios", "accesorios"];
    function categorySlug(name) {
        const norm = name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
        const match = KNOWN_CAT_SLUGS.find(slug => norm.includes(slug));
        return match || norm.replace(/\s+/g, "-");
    }

    function renderLayoutBlock(block, products) {
        const c = block.config;
        const div = document.createElement("div");
        switch(block.block_type) {
            case "announcement_bar":
                div.innerHTML = `<div style="background:${c.background_color||'#1D7A4F'};color:${c.text_color||'#fff'};text-align:center;padding:0.5rem 1rem;font-size:12px;font-weight:500;letter-spacing:.3px">${c.text}</div>`;
                break;
            case "hero_banner":
                div.innerHTML = `
                    <section class="hero" style="${c.image_url?`background:url('${c.image_url}') center/cover no-repeat;`:`background:${c.background_color||'#0F1A14'};`}">
                        <p class="hero-eyebrow">Acero inoxidable · Grado 304</p>
                        <h1 class="hero-title">
                            <span class="w1">${c.title}</span>
                            <span class="w2">${c.subtitle}</span>
                        </h1>
                        <div class="hero-cut"></div>
                        <p class="hero-sub">Sin teflón. Sin tóxicos. Sin excusas.<br>Equipos de cocina en acero inoxidable que duran <em>décadas,</em> no temporadas.</p>
                        <div class="hero-actions">
                            <button class="btn-primary" onclick="document.getElementById('prod-section')?.scrollIntoView({behavior:'smooth'})">${c.button_text}</button>
                            <button class="btn-ghost" onclick="document.getElementById('why')?.scrollIntoView({behavior:'smooth'})">¿Por qué acero?</button>
                        </div>
                        <div class="hero-badge"><div class="hero-badge-ring">
                            <span class="num">304</span>
                            <span class="txt">Grado<br>acero</span>
                        </div></div>
                    </section>`;
                break;
            case "product_grid":
                const cols = c.columns || 3;
                const limit = parseInt(c.limit) || 6;
                const prods = products.slice(0, limit);
                div.innerHTML = `
                    <section class="sec" id="prod-section" style="background:#F5F5F3">
                        <div class="sec-header">
                            <h2 class="sec-title">${c.title}</h2>
                            <a href="categorias.html" class="sec-link">Ver catálogo <i class="ti ti-arrow-right" style="font-size:13px"></i></a>
                        </div>
                        <div class="prod-grid" style="grid-template-columns:repeat(${cols},1fr)">
                            ${prods.length === 0
                                ? `<div class="prod-empty">No hay productos disponibles aún.</div>`
                                : prods.map((p,i) => {
                                    const badges = ["MÁS VENDIDO","NUEVO","REGALO","OFERTA"];
                                    const badge = i<2?`<span class="prod-badge ${i===1?'sand':''}">${badges[i]}</span>`:"";
                                    const img = p.image_url?`<img src="${p.image_url}" alt="${p.name}" loading="lazy">`:`<i class="ti ti-tools-kitchen-2 no-img"></i>`;
                                    return `<div class="prod-card" onclick="window.location.href='product.html?id=${p.id}'">
                                        <div class="prod-img">${img}${badge}</div>
                                        <div class="prod-info">
                                            <p class="stars">★★★★★</p>
                                            <p class="prod-name">${p.name}</p>
                                            <p class="prod-sub">Acero 304 · ${p.stock>0?'En stock':'Sin stock'}</p>
                                            <div class="prod-row">
                                                <span class="prod-price">${vxPrice(p.price)}</span>
                                                <button class="prod-btn" onclick="event.stopPropagation();handleAdd('${p.id}','${p.name}',${p.stock})">Agregar</button>
                                            </div>
                                        </div>
                                    </div>`;
                                }).join("")
                            }
                        </div>
                    </section>`;
                break;
            case "text_section":
                div.innerHTML = `
                    <section style="background:${c.background_color||'#F5F5F3'};padding:3.5rem 2rem;text-align:${c.text_align||'center'}">
                        <p style="font-size:11px;font-weight:500;letter-spacing:.18em;color:#1D7A4F;text-transform:uppercase;margin-bottom:.8rem">Velonox</p>
                        <h2 style="font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#0F1A14;margin-bottom:1rem">${c.title}</h2>
                        <p style="font-size:15px;color:#6B8A7A;max-width:600px;margin:0 auto;line-height:1.7">${c.content}</p>
                    </section>`;
                break;
            case "testimonials":
                const items = c.items||[];
                div.innerHTML = `
                    <section style="background:#F5F5F3;padding:3.5rem 2rem">
                        <div class="sec-header"><h2 class="sec-title">${c.title}</h2></div>
                        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem">
                            ${items.map(item=>`
                            <div style="background:white;border:1px solid #E8E8E4;border-radius:2px;padding:1.2rem">
                                <div style="color:#D6C5A0;margin-bottom:.5rem;font-size:13px">${'★'.repeat(item.rating||5)}</div>
                                <p style="color:#4A6A5A;font-size:13px;margin-bottom:.7rem;line-height:1.6">"${item.text}"</p>
                                <strong style="font-size:12px;color:#0F1A14">— ${item.name}</strong>
                            </div>`).join('')}
                        </div>
                    </section>`;
                break;
            case "categories":
                const cats = c.items||[];
                div.innerHTML = `
                    <section class="sec">
                        <div class="sec-header"><h2 class="sec-title">${c.title}</h2></div>
                        <div class="cat-grid">
                            ${cats.map(cat=>`
                            <a href="catalogo.html?cat=${categorySlug(cat)}" class="cat-card">
                                <div class="cat-icon"><i class="ti ti-tools-kitchen-2"></i></div>
                                <p class="cat-name">${cat}</p>
                            </a>`).join('')}
                        </div>
                    </section>`;
                break;
            case "image_banner":
                if (!c.image_url) return null;
                div.innerHTML = `<div style="width:100%;height:${c.height||300}px;overflow:hidden">
                    <img src="${c.image_url}" alt="${c.alt_text||''}" style="width:100%;height:100%;object-fit:cover"></div>`;
                break;
            case "footer":
                div.innerHTML = `
                    <footer class="footer">
                        <div class="footer-top">
                            <div class="footer-brand">
                                <div><span class="a">Velo</span><span class="b">nox</span></div>
                                <p class="footer-tagline">${c.tagline}</p>
                            </div>
                            <div class="footer-col"><p>Tienda</p>
                                <a href="catalogo.html">Catálogo</a>
                                <a href="index.html">Sets regalo</a>
                                <a href="index.html">Ofertas</a>
                            </div>
                            <div class="footer-col"><p>Ayuda</p>
                                <a href="contacto.html">Contáctanos</a>
                                <a href="politicas.html">Envíos</a>
                                <a href="politicas.html#devoluciones">Devoluciones</a>
                                <a href="politicas.html#garantia">Garantía</a>
                            </div>
                            <div class="footer-col"><p>Nosotros</p>
                                <a href="nosotros.html">Nuestra historia</a>
                                <a href="nosotros.html">Por qué acero</a>
                            </div>
                            <div class="footer-col"><p>Legal</p>
                                <a href="terminos.html">Términos y condiciones</a>
                                <a href="politicas.html#privacidad">Privacidad</a>
                            </div>
                        </div>
                        <div class="footer-bottom">
                            <p class="footer-copy">© 2026 ${c.store_name}. Todos los derechos reservados.</p>
                            <div style="display:flex;align-items:center;gap:1rem">
                                <!-- Toggle de moneda -->
                                <div style="display:flex;align-items:center;background:#1A2820;border:1px solid #2A4A38;border-radius:2px;overflow:hidden">
                                    <button id="vx-btn-usd" onclick="setCurrency('USD')"
                                        style="padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:transparent;color:#4A6A5A;font-family:'DM Sans',sans-serif;transition:all .2s">
                                        USD
                                    </button>
                                    <button id="vx-btn-cop" onclick="setCurrency('COP')"
                                        style="padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:#1D7A4F;color:white;font-family:'DM Sans',sans-serif;transition:all .2s">
                                        COP
                                    </button>
                                </div>
                                <!-- Redes sociales -->
                                <div class="footer-social">
                                    <i class="ti ti-brand-instagram"></i>
                                    <i class="ti ti-brand-tiktok"></i>
                                    <i class="ti ti-brand-facebook"></i>
                                </div>
                            </div>
                        </div>
                </footer>`;
                break;
            case "custom_html":
                div.innerHTML = `<style>${c.css||''}</style>${c.html||''}`;
                break;
            default:
                return null;
        }
        return div;
    }

    init();
    window.addEventListener("currencyChanged", function() { init(); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Términos y Condiciones — Velonox</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;background:#F5F5F3;color:#0F1A14}
        nav{background:#0F1A14;padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .nav-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;letter-spacing:-.5px;text-decoration:none}
        .nav-logo .a{color:#C8D8C0}.nav-logo .b{color:#1D7A4F}
        .nav-links{display:flex;gap:1.5rem}
        .nav-links a{font-size:13px;color:#C8D8C0;text-decoration:none;opacity:.7;transition:opacity .2s}
        .nav-links a:hover{opacity:1}
        .nav-right{display:flex;gap:12px;align-items:center}
        .nav-icon{color:#C8D8C0;opacity:.7;font-size:18px;cursor:pointer;text-decoration:none}
        .nav-icon:hover{opacity:1}
        .nav-user{font-size:12px;color:#6B8A7A}
        .nav-admin{font-size:12px;color:#4A6A5A;text-decoration:none;padding:4px 10px;border:1px solid #2A4A38;border-radius:2px}

        /* HERO */
        .hero{background:#0F1A14;padding:5rem 2rem 4rem;text-align:center}
        .hero-eyebrow{font-size:11px;font-weight:500;letter-spacing:.18em;color:#1D7A4F;text-transform:uppercase;margin-bottom:1.2rem}
        .hero h1{font-family:'Playfair Display',serif;font-size:clamp(32px,5vw,52px);font-weight:900;color:#C8D8C0;line-height:1.1;letter-spacing:-2px;margin-bottom:1rem}
        .hero p{font-size:14px;color:#6B8A7A;max-width:500px;margin:0 auto;line-height:1.7}
        .hero-date{font-size:12px;color:#4A6A5A;margin-top:.75rem}

        /* ÍNDICE */
        .index-box{background:white;border:1px solid #E8E8E4;border-radius:4px;padding:1.5rem 2rem;margin-bottom:3rem}
        .index-box h3{font-size:13px;font-weight:600;color:#0F1A14;margin-bottom:1rem;text-transform:uppercase;letter-spacing:.06em}
        .index-list{display:grid;grid-template-columns:1fr 1fr;gap:.3rem}
        .index-list a{font-size:13px;color:#1D7A4F;text-decoration:none;padding:.2rem 0;transition:color .2s}
        .index-list a:hover{color:#0F3A20}

        /* CONTENT */
        .content{max-width:860px;margin:0 auto;padding:3rem 2rem 5rem}

        /* SECCIÓN */
        .tc-section{margin-bottom:3rem;scroll-margin-top:80px}
        .tc-num{font-family:'Playfair Display',serif;font-size:36px;font-weight:900;color:#E8E8E4;line-height:1;margin-bottom:.25rem}
        .tc-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#0F1A14;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid #E8E8E4}
        .tc-text p{font-size:14px;color:#4A6A5A;line-height:1.8;margin-bottom:1rem}
        .tc-text ul{padding-left:1.25rem;margin-bottom:1rem}
        .tc-text ul li{font-size:14px;color:#4A6A5A;line-height:1.8;margin-bottom:.3rem}
        .tc-text h4{font-size:14px;font-weight:600;color:#0F1A14;margin:1.5rem 0 .5rem}

        /* HIGHLIGHT */
        .highlight{background:#F0FAF5;border:1px solid #A8D8BC;border-radius:4px;padding:1rem 1.25rem;margin:1.5rem 0;display:flex;gap:.75rem;align-items:flex-start}
        .highlight i{color:#1D7A4F;font-size:18px;flex-shrink:0;margin-top:1px}
        .highlight p{font-size:13px;color:#1D5A3A;line-height:1.6;margin:0}

        .warning{background:#FFFBEB;border:1px solid #FCD34D;border-radius:4px;padding:1rem 1.25rem;margin:1.5rem 0;display:flex;gap:.75rem;align-items:flex-start}
        .warning i{color:#D97706;font-size:18px;flex-shrink:0;margin-top:1px}
        .warning p{font-size:13px;color:#78350F;line-height:1.6;margin:0}

        /* CTA */
        .cta-box{background:#1A2820;border:1px solid #243B2C;border-radius:4px;padding:2rem;text-align:center;margin-top:3rem}
        .cta-box strong{color:#C8D8C0;display:block;font-family:'Playfair Display',serif;font-size:20px;margin-bottom:.5rem}
        .cta-box p{font-size:14px;color:#6B8A7A;margin-bottom:1.25rem;line-height:1.6}
        .whatsapp-btn{display:inline-flex;align-items:center;gap:.6rem;background:#1D7A4F;color:#F5F5F3;padding:.75rem 1.5rem;border-radius:4px;text-decoration:none;font-weight:600;font-size:14px;transition:background .2s}
        .whatsapp-btn:hover{background:#22904F}

        /* FOOTER */
        footer{background:#0F1A14;padding:2rem;border-top:1px solid #1A2820}
        .footer-top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:1.5rem;margin-bottom:1.5rem;max-width:1100px;margin-left:auto;margin-right:auto}
        .footer-logo{font-family:'Playfair Display',serif;font-size:18px;font-weight:700}
        .footer-logo .a{color:#C8D8C0}.footer-logo .b{color:#1D7A4F}
        .footer-tagline{font-size:12px;color:#4A6A5A;margin-top:4px;font-style:italic}
        .footer-col p{font-size:11px;font-weight:500;color:#6B8A7A;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.75rem}
        .footer-col a{display:block;font-size:13px;color:#4A6A5A;text-decoration:none;margin-bottom:5px}
        .footer-col a:hover{color:#C8D8C0}
        .footer-bottom{border-top:1px solid #1A2820;padding-top:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;max-width:1100px;margin:0 auto}
        .footer-copy{font-size:11px;color:#2A4A38}
        .footer-social{display:flex;gap:12px}
        .footer-social i{font-size:18px;color:#2A4A38;cursor:pointer}
        .footer-social i:hover{color:#1D7A4F}
        @media(max-width:768px){.nav-links{display:none}.index-list{grid-template-columns:1fr}}
    </style>
</head>

<body>

<nav>
    <a href="index.html" class="nav-logo"><span class="a">Velo</span><span class="b">nox</span></a>
    <div class="nav-links">
        <a href="index.html">Cocina</a><a href="index.html">Sets</a><a href="index.html">Regalos</a><a href="nosotros.html">Nosotros</a>
    </div>
    <div class="nav-right">
        <span class="nav-user" id="nav-user"></span>
        <a href="cart.html" class="nav-icon"><i class="ti ti-shopping-bag"></i></a>
        <a href="admin.html" class="nav-admin" id="nav-admin" style="display:none">Admin</a>
        <a href="login.html" class="nav-icon" id="nav-login"><i class="ti ti-user"></i></a>
        <a href="#" class="nav-icon" id="nav-logout" style="display:none" onclick="logout();return false"><i class="ti ti-logout"></i></a>
    </div>
</nav>

<div id="layout-container"></div>

<script src="js/api.js"></script>
<script src="js/page-blocks.js"></script>
<script>
    async function init() {
        if (isLoggedIn()) {
            document.getElementById("nav-login").style.display = "none";
            document.getElementById("nav-logout").style.display = "block";
            try {
                const me = await getMe();
                document.getElementById("nav-user").textContent = me.full_name.split(" ")[0];
                if (me.is_admin) document.getElementById("nav-admin").style.display = "block";
            } catch(e) {}
        }
        await initPageBlocks("terminos");
    }
    init();
</script>
</body>
</html>

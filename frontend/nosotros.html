<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosotros — Velonox</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vendor/tabler-icons/tabler-icons.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;background:#F5F5F3;color:#0F1A14}

        /* NAV */
        nav{background:#0F1A14;padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .nav-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;letter-spacing:-.5px;text-decoration:none}
        .nav-logo .a{color:#C8D8C0}.nav-logo .b{color:#1D7A4F}
        .nav-links{display:flex;gap:1.5rem}
        .nav-links a{font-size:13px;color:#C8D8C0;text-decoration:none;opacity:.7;transition:opacity .2s}
        .nav-links a:hover{opacity:1}
        .nav-links a.active{opacity:1;color:#1D7A4F}
        .nav-right{display:flex;gap:12px;align-items:center}
        .nav-icon{color:#C8D8C0;opacity:.7;font-size:18px;cursor:pointer;text-decoration:none}
        .nav-icon:hover{opacity:1}
        .nav-user{font-size:12px;color:#6B8A7A}
        .nav-admin{font-size:12px;color:#4A6A5A;text-decoration:none;padding:4px 10px;border:1px solid #2A4A38;border-radius:2px}
        .nav-burger{display:none;flex-direction:column;justify-content:center;gap:5px;width:22px;height:18px;background:none;border:none;cursor:pointer;padding:0}
        .nav-burger span{display:block;width:100%;height:2px;background:#C8D8C0;transition:transform .25s,opacity .25s}
        .nav-burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
        .nav-burger.open span:nth-child(2){opacity:0}
        .nav-burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

        /* HERO */
        .hero{background:#0F1A14;padding:6rem 2rem 5rem;text-align:center;position:relative;overflow:hidden}
        .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 60% 50%, rgba(29,122,79,.08) 0%, transparent 70%)}
        .hero-eyebrow{font-size:11px;font-weight:500;letter-spacing:.18em;color:#1D7A4F;text-transform:uppercase;margin-bottom:1.5rem}
        .hero h1{font-family:'Playfair Display',serif;font-size:clamp(40px,6vw,72px);font-weight:900;color:#C8D8C0;line-height:1.05;letter-spacing:-2px;margin-bottom:1.5rem}
        .hero h1 em{color:#1D7A4F;font-style:normal}
        .hero-cut{width:120px;height:1px;background:#1D7A4F;margin:0 auto 1.5rem}
        .hero p{font-size:17px;color:#B0BEB8;max-width:600px;margin:0 auto;line-height:1.7;font-weight:300}

        /* SÍMBOLO DECORATIVO */
        .hero-symbol{position:absolute;right:5%;top:50%;transform:translateY(-50%);opacity:.04}

        /* HISTORIA */
        .historia{padding:5rem 2rem;max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center}
        .historia-eyebrow{font-size:11px;font-weight:500;letter-spacing:.18em;color:#1D7A4F;text-transform:uppercase;margin-bottom:1rem}
        .historia h2{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:#0F1A14;line-height:1.2;margin-bottom:1.5rem}
        .historia p{font-size:15px;color:#4A6A5A;line-height:1.8;margin-bottom:1rem}
        .historia-img{background:#0F1A14;border-radius:4px;height:420px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
        .historia-img-inner{display:flex;flex-direction:column;align-items:center;gap:1rem;text-align:center}
        .historia-year{font-family:'Playfair Display',serif;font-size:80px;font-weight:900;color:#1D7A4F;line-height:1;opacity:.15}
        .historia-badge{position:absolute;bottom:1.5rem;left:1.5rem;right:1.5rem;background:rgba(29,122,79,.1);border:1px solid #1D7A4F;border-radius:2px;padding:1rem;text-align:center}
        .historia-badge p{font-size:12px;color:#C8D8C0;line-height:1.5}
        .historia-badge strong{color:#1D7A4F}

        /* PROPÓSITO */
        .proposito{background:#0F1A14;padding:5rem 2rem;text-align:center}
        .proposito-inner{max-width:800px;margin:0 auto}
        .proposito-eyebrow{font-size:11px;font-weight:500;letter-spacing:.18em;color:#1D7A4F;text-transform:uppercase;margin-bottom:1.5rem}
        .proposito h2{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:#C8D8C0;line-height:1.2;margin-bottom:2rem}
        .proposito h2 em{color:#1D7A4F;font-style:normal}
        .proposito p{font-size:15px;color:#6B8A7A;line-height:1.8;margin-bottom:1rem}
        .proposito-stat{display:inline-block;margin:2rem 1rem 0;text-align:center}
        .proposito-stat .num{font-family:'Playfair Display',serif;font-size:48px;font-weight:900;color:#1D7A4F;display:block;line-height:1}
        .proposito-stat .label{font-size:12px;color:#4A6A5A;margin-top:.4rem;display:block}
        .proposito-stats{display:flex;justify-content:center;gap:3rem;flex-wrap:wrap;margin-top:2rem;padding-top:2rem;border-top:1px solid #1A2820}

        /* MISIÓN Y VISIÓN */
        .mv{padding:5rem 2rem;max-width:1100px;margin:0 auto}
        .mv-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem}
        .mv-card{border-radius:4px;padding:2.5rem;position:relative;overflow:hidden}
        .mv-mision{background:#1D7A4F}
        .mv-vision{background:#0F1A14;border:1px solid #1A2820}
        .mv-tag{font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;margin-bottom:1.5rem;display:block}
        .mv-mision .mv-tag{color:rgba(200,216,192,.6)}
        .mv-vision .mv-tag{color:#4A6A5A}
        .mv-card h3{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1.2;margin-bottom:1.2rem}
        .mv-mision h3{color:#F5F5F3}
        .mv-vision h3{color:#C8D8C0}
        .mv-card p{font-size:14px;line-height:1.8}
        .mv-mision p{color:rgba(245,245,243,.8)}
        .mv-vision p{color:#6B8A7A}
        .mv-icon{position:absolute;right:1.5rem;top:1.5rem;font-size:48px;opacity:.08}
        .mv-mision .mv-icon{color:#F5F5F3}
        .mv-vision .mv-icon{color:#1D7A4F}

        /* VALORES */
        .valores{background:#F5F5F3;padding:5rem 2rem}
        .valores-inner{max-width:1100px;margin:0 auto}
        .valores-eyebrow{font-size:11px;font-weight:500;letter-spacing:.18em;color:#1D7A4F;text-transform:uppercase;margin-bottom:1rem}
        .valores h2{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:#0F1A14;margin-bottom:3rem}
        .valores-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1.5rem}
        .valor-card{background:white;border:1px solid #E8E8E4;border-radius:4px;padding:2rem;transition:border-color .2s,transform .2s}
        .valor-card:hover{border-color:#1D7A4F;transform:translateY(-4px)}
        .valor-num{font-family:'Playfair Display',serif;font-size:48px;font-weight:900;color:#E8E8E4;line-height:1;margin-bottom:.75rem}
        .valor-title{font-size:16px;font-weight:600;color:#0F1A14;margin-bottom:.6rem}
        .valor-text{font-size:13px;color:#6B8A7A;line-height:1.7}

        /* CLIENTE */
        .cliente{background:#0F1A14;padding:5rem 2rem}
        .cliente-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center}
        .cliente-eyebrow{font-size:11px;font-weight:500;letter-spacing:.18em;color:#1D7A4F;text-transform:uppercase;margin-bottom:1rem}
        .cliente h2{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:#C8D8C0;line-height:1.2;margin-bottom:1.5rem}
        .cliente p{font-size:15px;color:#6B8A7A;line-height:1.8;margin-bottom:1rem}
        .cliente-tags{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1.5rem}
        .cliente-tag{background:#1A2820;border:1px solid #2A4A38;color:#C8D8C0;font-size:12px;font-weight:500;padding:.4rem 1rem;border-radius:2px}
        .cliente-visual{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
        .cliente-card{background:#1A2820;border:1px solid #243B2C;border-radius:4px;padding:1.5rem;text-align:center}
        .cliente-card i{font-size:28px;color:#1D7A4F;margin-bottom:.75rem;display:block}
        .cliente-card strong{font-size:13px;color:#C8D8C0;display:block;margin-bottom:.3rem}
        .cliente-card span{font-size:12px;color:#4A6A5A;line-height:1.5}

        /* COMPROMISO */
        .compromiso{padding:5rem 2rem;max-width:1100px;margin:0 auto;text-align:center}
        .compromiso-eyebrow{font-size:11px;font-weight:500;letter-spacing:.18em;color:#1D7A4F;text-transform:uppercase;margin-bottom:1rem}
        .compromiso h2{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:#0F1A14;margin-bottom:1rem}
        .compromiso p{font-size:15px;color:#6B8A7A;max-width:600px;margin:0 auto 3rem;line-height:1.7}
        .compromiso-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1px;background:#E8E8E4}
        .compromiso-item{background:#F5F5F3;padding:2rem 1.5rem;text-align:center}
        .compromiso-item i{font-size:28px;color:#1D7A4F;margin-bottom:.75rem;display:block}
        .compromiso-item strong{font-size:14px;color:#0F1A14;display:block;margin-bottom:.4rem;font-weight:600}
        .compromiso-item span{font-size:12px;color:#6B8A7A;line-height:1.5}

        /* CTA */
        .cta{background:#1A2820;padding:4rem 2rem;text-align:center;border-top:1px solid #243B2C}
        .cta-eyebrow{font-size:11px;font-weight:500;letter-spacing:.18em;color:#4A6A5A;text-transform:uppercase;margin-bottom:1rem}
        .cta h2{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:#C8D8C0;margin-bottom:1rem}
        .cta h2 em{color:#1D7A4F;font-style:normal}
        .cta p{font-size:14px;color:#6B8A7A;max-width:480px;margin:0 auto 2rem;line-height:1.6}
        .btn-primary{background:#1D7A4F;color:#F5F5F3;font-size:14px;font-weight:500;padding:12px 32px;border-radius:2px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.02em;transition:background .2s;text-decoration:none;display:inline-block}
        .btn-primary:hover{background:#22904F}

        /* FOOTER */
        footer{background:#0F1A14;padding:2rem;border-top:1px solid #1A2820}
        .footer-top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:1.5rem;margin-bottom:1.5rem;max-width:1100px;margin-left:auto;margin-right:auto}
        .footer-logo{font-family:'Playfair Display',serif;font-size:18px;font-weight:700}
        .footer-logo .a{color:#C8D8C0}.footer-logo .b{color:#1D7A4F}
        .footer-tagline{font-size:12px;color:#4A6A5A;margin-top:4px;font-style:italic}
        .footer-col p{font-size:11px;font-weight:500;color:#6B8A7A;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.75rem}
        .footer-col a{display:block;font-size:13px;color:#4A6A5A;text-decoration:none;margin-bottom:5px;transition:color .2s}
        .footer-col a:hover{color:#C8D8C0}
        .footer-bottom{border-top:1px solid #1A2820;padding-top:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;max-width:1100px;margin:0 auto}
        .footer-copy{font-size:11px;color:#2A4A38}
        .footer-social{display:flex;gap:12px}
        .footer-social i{font-size:18px;color:#2A4A38;cursor:pointer;transition:color .2s}
        .footer-social i:hover{color:#1D7A4F}

        @media(max-width:768px){
            .historia,.mv-grid,.cliente-inner{grid-template-columns:1fr}
            .historia-img,.cliente-visual{display:none}
            .nav-burger{display:flex}
            .nav-links{
                display:flex;position:absolute;top:56px;left:0;right:0;
                flex-direction:column;gap:0;background:#0F1A14;
                max-height:0;overflow:hidden;border-bottom:1px solid #1A2820;
                transition:max-height .25s ease;
            }
            .nav-links.open{max-height:260px}
            .nav-links a{padding:.9rem 1.25rem;opacity:1;border-top:1px solid #1A2820}
            .proposito-stats{gap:1.5rem}
        }
    </style>
</head>

<body>

<!-- NAV -->
<nav>
    <a href="index.html" class="nav-logo"><span class="a">Velo</span><span class="b">nox</span></a>
    <div class="nav-links">
        <a href="categorias.html">Cocina</a>
        <a href="tienda.html">Catálogo</a>
        <a href="index.html">Sets</a>
        <a href="index.html">Regalos</a>
        <a href="nosotros.html" class="active">Nosotros</a>
    </div>
    <div class="nav-right">
        <span class="nav-user" id="nav-user"></span>
        <a href="cart.html" class="nav-icon"><i class="ti ti-shopping-bag"></i></a>
        <a href="admin.html" class="nav-admin" id="nav-admin" style="display:none">Admin</a>
        <a href="login.html" class="nav-icon" id="nav-login"><i class="ti ti-user"></i></a>
        <a href="#" class="nav-icon" id="nav-logout" style="display:none" onclick="logout();return false"><i class="ti ti-logout"></i></a>
        <button class="nav-burger" id="nav-burger" aria-label="Abrir menú" aria-expanded="false" onclick="toggleNavMenu()">
            <span></span><span></span><span></span>
        </button>
    </div>
</nav>

<div id="layout-container"></div>

<script src="js/api.js"></script>
<script src="js/page-blocks.js"></script>
<script>
    async function init() {
        if (isLoggedIn()) {
            document.getElementById("nav-login").style.display = "none";
            document.getElementById("nav-logout").style.display = "block";
            try {
                const me = await getMe();
                document.getElementById("nav-user").textContent = me.full_name.split(" ")[0];
                if (me.is_admin) document.getElementById("nav-admin").style.display = "block";
            } catch(e) {}
        }
        await initPageBlocks("nosotros");
    }

    function toggleNavMenu() {
        const open = document.querySelector(".nav-links").classList.toggle("open");
        const burger = document.getElementById("nav-burger");
        burger.classList.toggle("open", open);
        burger.setAttribute("aria-expanded", open);
    }
    document.querySelectorAll(".nav-links a").forEach(a => a.addEventListener("click", () => {
        document.querySelector(".nav-links").classList.remove("open");
        document.getElementById("nav-burger").classList.remove("open");
    }));

    init();
</script>
</body>
</html>
